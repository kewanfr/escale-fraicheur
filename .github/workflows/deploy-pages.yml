name: Déployer sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Déterminer le chemin de base GitHub Pages
        id: base
        shell: bash
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY%/*}"
          if [ -n "${{ vars.VITE_BASE_PATH }}" ]; then
            BASE="${{ vars.VITE_BASE_PATH }}"
          elif [ "$REPO" = "$OWNER.github.io" ]; then
            BASE="/"
          else
            BASE="/$REPO/"
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "VITE_BASE_PATH=$BASE"

      - name: Construire le frontend
        env:
          VITE_BASE_PATH: ${{ steps.base.outputs.base }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_TURNSTILE_SITE_KEY: ${{ vars.VITE_TURNSTILE_SITE_KEY }}
        run: npm run build

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Envoyer l'artefact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Déployer
        id: deployment
        uses: actions/deploy-pages@v4
